<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kunitachi City — touch proto</title>
<style>
  html,body{margin:0;height:100%;background:#07080a;overflow:hidden}
  #gl,#ov{position:fixed;inset:0;width:100vw;height:100vh;display:block}
  #ov{pointer-events:none}
  /* one-time tap affordance: the mic needs a user gesture (iOS). Dismissed on tap.
     Hidden until the city has loaded (proto.js reveals it) so a tap can't start
     audio over an empty scene. */
  #start{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:10;background:rgba(7,8,10,0.0);color:rgba(194,202,214,0.5);
    font:14px/1.5 -apple-system,"Helvetica Neue",Arial,sans-serif;letter-spacing:0.08em;
    -webkit-user-select:none;user-select:none;cursor:pointer}
  /* load veil: covers the empty scene while the ~16 MB glb streams in. Monochrome,
     minimal — a thin bar that fills with download % (or pulses if length unknown). */
  #loading{position:fixed;inset:0;z-index:11;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:#07080a;color:rgba(194,202,214,0.5);
    font:12px/1.6 -apple-system,"Helvetica Neue",Arial,sans-serif;letter-spacing:0.14em;
    -webkit-user-select:none;user-select:none}
  #loadlabel{margin-bottom:14px}
  #loadtrack{width:180px;height:1px;background:rgba(194,202,214,0.14);overflow:hidden}
  #loadfill{width:0;height:100%;background:rgba(194,202,214,0.55);transition:width .2s ease}
  #loading.indet #loadfill{width:38%;animation:loadslide 1.1s ease-in-out infinite}
  @keyframes loadslide{0%{margin-left:-42%}100%{margin-left:104%}}
  #loading.done{opacity:0;transition:opacity .5s ease;pointer-events:none}
  /* CAM HUD: the first on-screen control. Beat-driven 俯瞰⇔アップ camera. Monochrome,
     translucent, bottom-right; collapses via its header so it never crowds the scene. */
  #shothud{position:fixed;right:12px;bottom:12px;z-index:9;width:188px;
    background:rgba(7,8,10,0.42);backdrop-filter:blur(3px);border:1px solid rgba(194,202,214,0.12);
    color:rgba(194,202,214,0.62);font:11px/1.5 -apple-system,"Helvetica Neue",Arial,sans-serif;
    letter-spacing:0.06em;-webkit-user-select:none;user-select:none}
  #shothud-h{padding:6px 9px;cursor:pointer;display:flex;justify-content:space-between;
    border-bottom:1px solid rgba(194,202,214,0.10)}
  #shothud-b{padding:7px 9px 9px}
  #shothud.col #shothud-b{display:none}
  #shothud.col #shothud-h{border-bottom:none}
  #shothud label{display:block;margin:7px 0 2px;display:flex;justify-content:space-between}
  #shothud .v{color:rgba(194,202,214,0.85)}
  #shothud input[type=range]{width:100%;height:2px;margin:3px 0 0;accent-color:rgba(194,202,214,0.7);
    background:rgba(194,202,214,0.18);-webkit-appearance:none;appearance:none}
  #shothud input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;
    border-radius:50%;background:rgba(194,202,214,0.85)}
  #shothud .row{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
  /* SCOPE HUD: 音→建物変調（オシロスコープ都市）。CAM HUD と被らせないよう左下に。 */
  #scopehud{position:fixed;left:12px;bottom:12px;z-index:9;width:192px;
    background:rgba(7,8,10,0.42);backdrop-filter:blur(3px);border:1px solid rgba(194,202,214,0.12);
    color:rgba(194,202,214,0.62);font:11px/1.5 -apple-system,"Helvetica Neue",Arial,sans-serif;
    letter-spacing:0.06em;-webkit-user-select:none;user-select:none}
  #scopehud-h{padding:6px 9px;cursor:pointer;display:flex;justify-content:space-between;
    border-bottom:1px solid rgba(194,202,214,0.10)}
  #scopehud-b{padding:7px 9px 9px}
  #scopehud.col #scopehud-b{display:none}
  #scopehud.col #scopehud-h{border-bottom:none}
  #scopehud label{display:block;margin:7px 0 2px;display:flex;justify-content:space-between}
  #scopehud .v{color:rgba(194,202,214,0.85)}
  #scopehud input[type=range]{width:100%;height:2px;margin:3px 0 0;accent-color:rgba(194,202,214,0.7);
    background:rgba(194,202,214,0.18);-webkit-appearance:none;appearance:none}
  #scopehud input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;
    border-radius:50%;background:rgba(194,202,214,0.85)}
  #scopehud .row{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
</style>
<canvas id="gl"></canvas>
<canvas id="ov"></canvas>
<div id="loading" class="indet"><div id="loadlabel">国立市を読み込み中</div><div id="loadtrack"><div id="loadfill"></div></div></div>
<div id="start">TAP TO START&nbsp;·&nbsp;マイクを許可</div>
<div id="shothud">
  <div id="shothud-h"><span>CAM · ビート連動</span><span id="shothud-t">▾</span></div>
  <div id="shothud-b">
    <div class="row"><span>俯瞰⇔アップ切替</span><input type="checkbox" id="sh-en" checked></div>
    <label><span>切替間隔</span><span class="v" id="sh-sv">2小節</span></label><input type="range" id="sh-sw" min="0" max="3" step="1" value="1">
    <label><span>ブレンド</span><span class="v" id="sh-bv">0.18s</span></label><input type="range" id="sh-bl" min="0" max="1.2" step="0.02" value="0.18">
    <label><span>アップ比率</span><span class="v" id="sh-rv">0.50</span></label><input type="range" id="sh-ra" min="0" max="1" step="0.05" value="0.5">
    <label><span>前進(小=速)</span><span class="v" id="sh-tv">16</span></label><input type="range" id="sh-tr" min="6" max="32" step="1" value="16">
  </div>
</div>
<div id="scopehud">
  <div id="scopehud-h"><span>SCOPE · 建物連動</span><span id="scopehud-t">▾</span></div>
  <div id="scopehud-b">
    <div class="row"><span>有効</span><input type="checkbox" id="sc-en" checked></div>
    <label><span>モード</span><span class="v" id="sc-mv">呼吸</span></label>
    <input type="range" id="sc-mo" min="0" max="4" step="1" value="0">
    <label><span>空間</span><span class="v" id="sc-sv">同心円</span></label>
    <input type="range" id="sc-sp" min="0" max="2" step="1" value="0">
    <label><span>強さ(mix)</span><span class="v" id="sc-xv">1.00</span></label>
    <input type="range" id="sc-mx" min="0" max="1" step="0.02" value="1">
    <label><span>A比率(跳ね/消し)</span><span class="v" id="sc-av">0.00</span></label>
    <input type="range" id="sc-ar" min="0" max="1" step="0.02" value="0">
  </div>
</div>
<script>
  // Slider HUD → window.__proto.setShot(). __proto is created async by the module; oninput
  // only fires on user interaction (post-load) so lazy reference is safe.
  (function () {
    var BARS = [1, 2, 4, 8];
    var $ = function (id) { return document.getElementById(id); };
    var set = function (o) { if (window.__proto && window.__proto.setShot) window.__proto.setShot(o); };
    var hud = $('shothud');
    $('shothud-h').addEventListener('click', function () {
      hud.classList.toggle('col'); $('shothud-t').textContent = hud.classList.contains('col') ? '▸' : '▾';
    });
    $('sh-en').addEventListener('input', function (e) { set({ enabled: e.target.checked }); });
    $('sh-sw').addEventListener('input', function (e) { var b = BARS[+e.target.value]; $('sh-sv').textContent = b + '小節'; set({ switchBars: b }); });
    $('sh-bl').addEventListener('input', function (e) { var s = +e.target.value; $('sh-bv').textContent = s.toFixed(2) + 's'; set({ blendSec: s }); });
    $('sh-ra').addEventListener('input', function (e) { var r = +e.target.value; $('sh-rv').textContent = r.toFixed(2); set({ avenueRatio: r }); });
    $('sh-tr').addEventListener('input', function (e) { var t = +e.target.value; $('sh-tv').textContent = t; set({ travelBars: t }); });
  })();
</script>
<script>
  // SCOPE HUD → window.__proto.setScope()。音→建物変調（CityScope）の生ダイヤル。
  (function () {
    var MODES = ['breathing', 'scanbar', 'bloom', 'radar', 'eq'], MODE_JA = ['呼吸', '走査', '開花', 'レーダー', 'EQ'];
    var SPATIAL = ['rings', 'avenue', 'both'], SPATIAL_JA = ['同心円', '並木', '両方'];
    var $ = function (id) { return document.getElementById(id); };
    var set = function (o) { if (window.__proto && window.__proto.setScope) window.__proto.setScope(o); };
    var hud = $('scopehud');
    $('scopehud-h').addEventListener('click', function () {
      hud.classList.toggle('col'); $('scopehud-t').textContent = hud.classList.contains('col') ? '▸' : '▾';
    });
    $('sc-en').addEventListener('input', function (e) { set({ enabled: e.target.checked }); });
    $('sc-mo').addEventListener('input', function (e) { var i = +e.target.value; $('sc-mv').textContent = MODE_JA[i]; set({ mode: MODES[i] }); });
    $('sc-sp').addEventListener('input', function (e) { var i = +e.target.value; $('sc-sv').textContent = SPATIAL_JA[i]; set({ spatial: SPATIAL[i] }); });
    $('sc-mx').addEventListener('input', function (e) { var v = +e.target.value; $('sc-xv').textContent = v.toFixed(2); set({ mix: v }); });
    $('sc-ar').addEventListener('input', function (e) { var v = +e.target.value; $('sc-av').textContent = v.toFixed(2); set({ aRatio: v }); });
  })();
</script>
<script type="importmap">
{ "imports": {
  "three": "./src/vendor/three.module.js",
  "three/addons/": "./src/vendor/three-addons/"
} }
</script>
<script type="module" src="./src/cityproto/proto.js"></script>
